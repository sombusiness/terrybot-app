<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerryBot — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#1B2B4B"/>
<style>
body{display:flex;flex-direction:column;min-height:100vh;background:var(--navy)}
.auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;max-width:420px;margin:0 auto;width:100%}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.auth-logo-icon{width:52px;height:52px;background:var(--yellow);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--navy)}
.auth-logo-text{color:white;font-size:28px;font-weight:900}
.auth-logo-text span{color:var(--yellow)}
.auth-logo-sub{color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;margin-top:2px}
.auth-card{background:white;border-radius:20px;padding:2rem;width:100%}
.auth-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:1.5rem}
.auth-sub a{color:var(--navy);font-weight:800;text-decoration:none}
.form-group{margin-bottom:1rem}
.form-label{font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;display:block}
.form-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Nunito',sans-serif;color:var(--text);background:white;outline:none;transition:border-color 0.15s;font-weight:600}
.form-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,43,75,0.08)}
.btn-auth{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.btn-navy{background:var(--navy);color:white}
.btn-navy:hover{background:var(--navy-light)}
.btn-google{background:white;color:var(--text);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--navy);background:#F9FAFB}
.google-icon{width:20px;height:20px}
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;font-weight:700;color:var(--muted)}
.forgot-link{text-align:center;margin-top:1rem}
.forgot-link a{font-size:13px;font-weight:700;color:var(--muted);text-decoration:none}
.forgot-link a:hover{color:var(--navy)}
.error-msg{background:var(--red-light);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--red);margin-bottom:1rem;display:none}
.auth-footer{text-align:center;color:rgba(255,255,255,0.4);font-size:12px;font-weight:600;padding:1.5rem 0}
.auth-footer a{color:rgba(255,255,255,0.5);text-decoration:none}
.loading{opacity:0.6;pointer-events:none}
</style>
</head>
<body>

<div class="auth-wrap">

  <!-- LOGO -->
  <div class="auth-logo">
    <div class="auth-logo-icon">T</div>
    <div>
      <div class="auth-logo-text">Terry<span>Bot</span></div>
      <div class="auth-logo-sub">Trade invoices &amp; tax made easy</div>
    </div>
  </div>

  <!-- LOGIN CARD -->
  <div class="auth-card">
    <div class="auth-title">Welcome back 👋</div>
    <div class="auth-sub">Don't have an account? <a href="signup.html">Sign up free</a></div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- GOOGLE -->
    <button class="btn-auth btn-google" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or sign in with email</div>
      <div class="divider-line"></div>
    </div>

    <!-- EMAIL LOGIN -->
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" id="email" class="form-input" placeholder="dave@smithplumbing.co.uk"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Your password"/>
    </div>

    <button class="btn-auth btn-navy" id="loginBtn" onclick="signInWithEmail()">Sign in →</button>

    <div class="forgot-link">
      <a href="reset.html">Forgot your password?</a>
    </div>
  </div>

  <div class="auth-footer">
    <a href="landing.html">← Back to TerryBot.co.uk</a>
  </div>

</div>

<script>
const SUPABASE_URL  = 'https://gavyzfmixpeddxqqdhzp.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhdnl6Zm1peHBlZGR4cXFkaHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDQ0MzYsImV4cCI6MjA5MTUyMDQzNn0.6SqiqqGeH-an2FYhqaVDh1J_CVerhzG8YqbbDePttPM';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// If already logged in, go to dashboard
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.replace('dashboard.html');
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  btn.textContent = loading ? 'Signing in...' : 'Sign in →';
  btn.classList.toggle('loading', loading);
}

async function signInWithEmail() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showError('Please enter your email and password'); return; }

  setLoading(true);
  document.getElementById('errorMsg').style.display = 'none';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading(false);
    if (error.message.includes('Invalid login')) {
      showError('Wrong email or password. Try again or reset your password.');
    } else {
      showError(error.message);
    }
  } else {
    window.location.replace('dashboard.html');
  }
}

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showError(error.message);
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') signInWithEmail();
});
</script>
</body>
</html>
