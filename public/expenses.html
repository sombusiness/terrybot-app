<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerryBot — Log an Expense</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#1B2B4B"/>
<style>
.summary-bar{background:var(--navy);border-radius:14px;padding:1rem 1.25rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.summary-item{text-align:center}
.summary-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.summary-value{font-size:18px;font-weight:900;color:white}
.summary-value.yellow{color:var(--yellow)}
.tab-row{display:grid;grid-template-columns:1fr 1fr;margin-bottom:1.25rem;background:white;border-radius:14px;border:1.5px solid var(--border);overflow:hidden}
.tab-btn{padding:12px;text-align:center;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;border:none;background:white;font-family:'Nunito',sans-serif;transition:all 0.15s}
.tab-btn.active{background:var(--navy);color:white}
.category-btn{padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:800;color:var(--text);cursor:pointer;text-align:center;transition:all 0.15s;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px}
.category-btn.selected{border-color:var(--navy);background:var(--navy);color:white}
.category-icon{font-size:20px}
.category-label{font-size:11px;font-weight:800}
.claim-display{background:var(--yellow-light);border:1.5px solid var(--yellow);border-radius:10px;padding:0.75rem;text-align:center;margin-top:10px;display:none}
.claim-display.show{display:block}
.claim-label{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.claim-amount{font-size:26px;font-weight:900;color:var(--navy)}
.expense-row{display:flex;align-items:center;gap:12px;padding:0.9rem 1.25rem;border-bottom:1px solid #F3F4F6}
.expense-row:last-child{border-bottom:none}
.expense-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.expense-info{flex:1}
.expense-desc{font-size:14px;font-weight:800;color:var(--text)}
.expense-cat{font-size:12px;font-weight:600;color:var(--muted)}
.expense-amount{font-size:14px;font-weight:900;color:var(--red)}
.upload-preview{display:none;margin-top:10px}
.upload-preview.show{display:block}
.upload-preview img{width:100%;max-height:180px;object-fit:contain;border-radius:8px;border:1px solid var(--border)}
.upload-preview-name{font-size:12px;font-weight:700;color:var(--muted);margin-top:6px;text-align:center}
.success-screen{text-align:center;padding:2rem 0}
.success-terry{width:180px;height:200px;object-fit:contain;margin:0 auto 1rem;display:block}
</style>
</head>
<body>

<nav>
  <div class="nav-left" onclick="window.location.href='dashboard.html'">
    <div class="nav-logo">T</div>
    <div>
      <div class="nav-brand">Terry<span>Bot</span></div>
      <div class="nav-tagline">Trade invoices &amp; tax made easy</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="nav-back" onclick="window.location.href='dashboard.html'">← Dashboard</div>
    <button onclick="signOut()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:12px;font-weight:800;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:Nunito,sans-serif">Sign out</button>
  </div>
</nav>

<div class="main" id="mainContent">

  <!-- SUMMARY BAR -->
  <div class="summary-bar" style="margin-top:1rem">
    <div class="summary-item">
      <div class="summary-label">This month</div>
      <div class="summary-value yellow" id="monthTotal">£0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">This year</div>
      <div class="summary-value" id="yearTotal">£0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Tax saved</div>
      <div class="summary-value yellow" id="taxSaved">£0</div>
    </div>
  </div>

  <!-- TERRY TIP -->
  <div class="terry-tip">
    <div class="terry-tip-img">
      <img src="images/terry-invoice-v2.png" alt="Terry"/>
    </div>
    <div class="terry-tip-bubble">
      <div class="terry-tip-title">Terry says...</div>
      <p class="terry-tip-text">Every receipt you save <strong>reduces your tax bill</strong>. Don't skip this bit!</p>
    </div>
  </div>

  <!-- TAB SWITCHER -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabSnap" onclick="switchTab('snap')">⚡ Quick log</button>
    <button class="tab-btn" id="tabType" onclick="switchTab('type')">✏️ Type it in</button>
  </div>

  <!-- SNAP TAB -->
  <div id="snapPanel">
    <div class="form-card">
      <div class="form-group">
        <label class="form-label">What was this for? <span style="color:var(--red)">*</span></label>
        <input type="text" id="snapDesc" class="form-input" placeholder="e.g. Copper pipe fittings from Screwfix"/>
      </div>
      <div class="form-group">
        <label class="form-label">Amount (£) <span style="color:var(--red)">*</span></label>
        <input type="number" id="snapAmount" class="form-input" placeholder="0.00" step="0.01" min="0" oninput="updateClaimDisplay('snap')"/>
        <div class="claim-display" id="snapClaimDisplay">
          <div class="claim-label">You're claiming</div>
          <div class="claim-amount" id="snapClaimAmount">£0.00</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category <span style="color:var(--red)">*</span></label>
        <div class="cat-grid" id="snapCategoryGrid"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" id="snapDate" class="form-input"/>
      </div>
      <button class="btn btn-navy btn-full" onclick="saveExpense()">Save this expense ✓</button>
    </div>
  </div>
