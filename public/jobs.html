<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerryBot — All Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#F5C518;--yellow-light:#FEF9E7;--navy:#1B2B4B;--navy-light:#2E4070;
  --green:#16A34A;--green-light:#DCFCE7;--red:#DC2626;--red-light:#FEE2E2;
  --orange:#EA580C;--orange-light:#FFF7ED;--border:#E5E7EB;
  --text:#111827;--muted:#6B7280;--white:#ffffff;
}
body{font-family:'Nunito',sans-serif;background:#F4F6FA;color:var(--text);min-height:100vh;padding-bottom:100px}
nav{background:var(--navy);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo{width:32px;height:32px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--navy)}
.nav-brand{color:white;font-size:20px;font-weight:900}
.nav-brand span{color:var(--yellow)}
.nav-tagline{color:rgba(255,255,255,0.5);font-size:14px;font-weight:600}
.nav-back{color:rgba(255,255,255,0.8);font-size:13px;font-weight:700;cursor:pointer}
.main{padding:1.25rem;max-width:480px;margin:0 auto}

/* SUMMARY PILLS */
.summary-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
.pill{background:white;border:1.5px solid var(--border);border-radius:12px;padding:0.75rem;text-align:center}
.pill-value{font-size:20px;font-weight:900;color:var(--text)}
.pill-label{font-size:11px;font-weight:700;color:var(--muted);margin-top:2px}
.pill-value.green{color:var(--green)}
.pill-value.red{color:var(--red)}
.pill-value.orange{color:var(--orange)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1rem}
.search-input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:'Nunito',sans-serif;color:var(--text);background:white;outline:none;font-weight:600}
.search-input:focus{border-color:var(--navy)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:7px 16px;border-radius:999px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:800;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all 0.15s}
.filter-tab.active{background:var(--navy);border-color:var(--navy);color:white}
.filter-tab:hover:not(.active){border-color:var(--navy);color:var(--navy)}

/* JOB CARDS */
.jobs-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem}
.job-card{background:white;border-radius:14px;border:1.5px solid var(--border);padding:1rem 1.25rem;cursor:pointer;transition:all 0.15s}
.job-card:hover{border-color:var(--navy);transform:translateY(-1px)}
.job-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.job-name{font-size:15px;font-weight:800;color:var(--text)}
.job-amount{font-size:16px;font-weight:900;color:var(--text)}
.job-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.job-desc{font-size:12px;font-weight:600;color:var(--muted)}
.job-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;display:inline-block}
.badge-paid{background:var(--green-light);color:var(--green)}
.badge-pending{background:var(--orange-light);color:var(--orange)}
.badge-overdue{background:var(--red-light);color:var(--red)}
.badge-draft{background:#F3F4F6;color:var(--muted)}
.job-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6}
.job-inv-num{font-size:11px;font-weight:700;color:var(--muted)}
.job-actions{display:flex;gap:6px}
.job-action-btn{font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text);transition:all 0.15s}
.job-action-btn:hover{border-color:var(--navy);color:var(--navy)}
.job-action-btn.primary{background:var(--navy);border-color:var(--navy);color:white}

/* NEW INVOICE FAB */
.fab{position:fixed;bottom:80px;right:1.25rem;width:56px;height:56px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 4px 12px rgba(27,43,75,0.3);z-index:99;transition:all 0.15s}
.fab:hover{background:var(--navy-light);transform:scale(1.05)}

/* TERRY TIP */
.terry-tip{background:var(--navy);border-radius:16px;padding:1rem 1rem;display:flex;align-items:flex-end;gap:0;margin-bottom:1.25rem;overflow:hidden;min-height:110px}
.tip-terry{width:90px;height:105px;object-fit:contain;object-position:bottom;flex-shrink:0;margin-left:-10px;margin-bottom:-20px}
.tip-content{flex:1;padding-left:10px}
.tip-label{display:inline-block;background:var(--yellow);color:var(--navy);font-size:10px;font-weight:800;padding:2px 10px;border-radius:999px;margin-bottom:6px}
.tip-content p{color:rgba(255,255,255,0.9);font-size:13px;font-weight:600;line-height:1.55}
.tip-content strong{color:var(--yellow)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:3rem 1rem}
.empty-icon{font-size:48px;margin-bottom:1rem}
.empty-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px;font-weight:600;color:var(--muted)}

/* BOTTOM NAV */
.bottom-nav{background:white;border-top:1.5px solid var(--border);padding:0.6rem 0 0.5rem;display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 16px;border-radius:10px;transition:all 0.15s}
.nav-item.active{background:var(--yellow-light)}
.nav-icon{font-size:22px}
.nav-item-label{font-size:10px;font-weight:800;color:var(--muted)}
.nav-item.active .nav-item-label{color:var(--navy)}
.hidden{display:none}
</style>
</head>

    </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by customer or job..." oninput="filterJobs()"/>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">All jobs</button>
    <button class="filter-tab" onclick="setFilter('paid', this)">Paid</button>
    <button class="filter-tab" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-tab" onclick="setFilter('overdue', this)">Overdue</button>
    <button class="filter-tab" onclick="setFilter('draft', this)">Draft</button>
  </div>

  <!-- JOBS LIST -->
  <div class="jobs-list" id="jobsList"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state hidden" id="emptyState">
    <div class="empty-icon">📋</div>
    <div class="empty-title">No jobs found</div>
    <div class="empty-sub">Try a different search or filter</div>
  </div>

<div class="fab" onclick="window.location.href='invoice.html'" title="New invoice">＋</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><div class="nav-icon">🏠</div><div class="nav-item-label">Home</div></div>
  <div class="nav-item active"><div class="nav-icon">📋</div><div class="nav-item-label">Invoices</div></div>

  <div class="nav-item" onclick="window.location.href='tax.html'"><div class="nav-icon">📊</div><div class="nav-item-label">Tax</div></div>
  <div class="nav-item" onclick="window.location.href='pricing.html'"><div class="nav-icon">⚙️</div><div class="nav-item-label">Settings</div></div>
</div>

<script>
const jobs = [
  { id:'TB-007', name:'Mrs Henderson', desc:'Boiler service', addr:'14 Maple Close, Brentwood', date:'3 Jan 2025', amount:180, status:'paid' },
  { id:'TB-006', name:'Mr Patel', desc:'Bathroom retiling', addr:'7 Oak Street, Chelmsford', date:'10 Jan 2025', amount:420, status:'pending' },
  { id:'TB-005', name:'Johnson Bros', desc:'Roof repair', addr:'22 High Road, Romford', date:'2 Jan 2025', amount:260, status:'overdue' },
  { id:'TB-004', name:'Ms Clarke', desc:'New radiator fitted', addr:'5 Elm Avenue, Brentwood', date:'29 Dec 2024', amount:340, status:'paid' },
  { id:'TB-003', name:'Mr Thompson', desc:'Emergency callout — burst pipe', addr:'18 Park Lane, Basildon', date:'22 Dec 2024', amount:185, status:'paid' },
  { id:'TB-002', name:'Green Valley Café', desc:'Full kitchen replumb', addr:'3 High Street, Brentwood', date:'15 Dec 2024', amount:1240, status:'paid' },
  { id:'TB-001', name:'Mr & Mrs Davies', desc:'New boiler installation', addr:'9 Rose Gardens, Wickford', date:'8 Dec 2024', amount:2400, status:'pending' },
];

let currentFilter = 'all';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterJobs();
}

function filterJobs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('jobsList');
  const empty = document.getElementById('emptyState');
  let filtered = jobs.filter(j => {
    const matchFilter = currentFilter === 'all' || j.status === currentFilter;
    const matchSearch = !search || j.name.toLowerCase().includes(search) || j.desc.toLowerCase().includes(search) || j.id.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });
  
  if(filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    list.innerHTML = filtered.map(j => {
      const badgeClass = { paid:'badge-paid', pending:'badge-pending', overdue:'badge-overdue', draft:'badge-draft' }[j.status];
      const badgeLabel = j.status.charAt(0).toUpperCase() + j.status.slice(1);
      const actions = j.status === 'paid'
        ? '<button class="job-action-btn">View PDF</button>'
        : j.status === 'overdue'
        ? '<button class="job-action-btn primary">Chase payment</button><button class="job-action-btn">View PDF</button>'
        : '<button class="job-action-btn primary">Send invoice</button><button class="job-action-btn">View PDF</button>';
      return `
        <div class="job-card" onclick="window.location.href='invoice-view.html?id=${{j.id}}'">
          <div class="job-card-top">
            <div>
              <div class="job-name">${j.name}</div>
              <div class="job-meta" style="margin-top:4px">
                <span class="job-badge ${badgeClass}">${badgeLabel}</span>
                <span class="job-desc">${j.desc}</span>
              </div>
              <div class="job-desc" style="margin-top:3px">📍 ${j.addr} · ${j.date}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div class="job-amount">£${j.amount.toFixed(2)}</div>
            </div>
          </div>
          <div class="job-card-bottom">
            <span class="job-inv-num">Invoice #${j.id}</span>
            <div class="job-actions">${actions}</div>
          </div>
        </div>`;
    }).join('');
  }
  
  // Update pill counts
  document.getElementById('paidCount').textContent = jobs.filter(j=>j.status==='paid').length;
  document.getElementById('pendingCount').textContent = jobs.filter(j=>j.status==='pending').length;
  document.getElementById('overdueCount').textContent = jobs.filter(j=>j.status==='overdue').length;
}

filterJobs();
</script>
