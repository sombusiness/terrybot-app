<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerryBot — All Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#1B2B4B"/>
</head>
<body>

<nav>
  <div class="nav-left" onclick="window.location.href='dashboard.html'">
    <div class="nav-logo">T</div>
    <div>
      <div class="nav-brand">Terry<span>Bot</span></div>
      <div class="nav-tagline">Trade invoices &amp; tax made easy</div>
    </div>
  </div>
  <div class="nav-back" onclick="window.location.href='dashboard.html'">← Dashboard</div>
</nav>

<div class="main">
  <div style="margin-top:1rem" class="summary-pills" id="summaryPills">
    <div class="pill"><div class="pill-value green" id="paidCount">0</div><div class="pill-label">Paid</div></div>
    <div class="pill"><div class="pill-value orange" id="pendingCount">0</div><div class="pill-label">Pending</div></div>
    <div class="pill"><div class="pill-value red" id="overdueCount">0</div><div class="pill-label">Overdue</div></div>
  </div>

  <div class="terry-tip">
    <div class="terry-tip-img"><img src="images/terry-invoice-v2.png" alt="Terry"/></div>
    <div class="terry-tip-bubble">
      <div class="terry-tip-title">Terry says...</div>
      <p class="terry-tip-text" id="terryTipText">Loading your jobs...</p>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by customer or job..." oninput="renderJobs()"/>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" id="tab-all"     onclick="setFilter('all',this)">All jobs</button>
    <button class="filter-tab"        id="tab-paid"    onclick="setFilter('paid',this)">Paid</button>
    <button class="filter-tab"        id="tab-pending" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-tab"        id="tab-overdue" onclick="setFilter('overdue',this)">Overdue</button>
  </div>

  <div id="jobList"></div>
  <div class="hidden" id="emptyState" style="text-align:center;padding:3rem 1rem">
    <div style="font-size:48px;margin-bottom:1rem">📋</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:6px">No jobs found</div>
    <div style="font-size:14px;font-weight:600;color:var(--muted)">Try a different search or filter</div>
  </div>
</div>

<div class="fab" onclick="window.location.href='invoice.html'" title="New invoice">＋</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div><div class="nav-item-label">Home</div></div>
  <div class="nav-item active" onclick="window.location.href='jobs.html'"><div class="nav-icon">📋</div><div class="nav-item-label">Invoices</div></div>
  <div class="nav-item" onclick="window.location.href='expenses.html'"><div class="nav-icon">💰</div><div class="nav-item-label">Expenses</div></div>
  <div class="nav-item" onclick="window.location.href='tax.html'"><div class="nav-icon">📊</div><div class="nav-item-label">Tax</div></div>
  <div class="nav-item" onclick="window.location.href='settings.html'"><div class="nav-icon">⚙️</div><div class="nav-item-label">Settings</div></div>
</div>

<script src="js/app.js"></script>
<script src="js/supabase-client.js"></script>
<script>
var allJobs = [];
var activeFilter = 'all';

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderJobs();
}

function renderJobs() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var jobs = allJobs;
  if (activeFilter !== 'all') {
    jobs = jobs.filter(function(j) { return j.status === activeFilter; });
  }
  if (q) {
    jobs = jobs.filter(function(j) {
      return (j.name && j.name.toLowerCase().includes(q)) ||
             (j.desc && j.desc.toLowerCase().includes(q)) ||
             (j.id && j.id.toLowerCase().includes(q));
    });
  }

  var list  = document.getElementById('jobList');
  var empty = document.getElementById('emptyState');

  if (!jobs.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  var html = '';
  for (var i = 0; i < jobs.length; i++) {
    var job = jobs[i];
    var actions = '<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();window.location.href=\'invoice-view.html?id=' + job.id + '\'">View</button>' +
      '<button class="btn btn-sm btn-yellow" onclick="event.stopPropagation();showReminderModal(' + JSON.stringify(job).replace(/'/g, "\\'") + ')" style="margin-left:6px">🔔 Remind</button>';
    html += '<div class="job-card" onclick="window.location.href=\'invoice-view.html?id=' + job.id + '\'">' +
      '<div class="job-card-top">' +
        '<div>' +
          '<div class="job-card-name">' + (job.name || '') + '</div>' +
          '<div class="job-card-meta">' +
            '<span class="badge badge-' + job.status + '">' + job.status + '</span>' +
            '<span style="font-size:12px;font-weight:600;color:var(--muted)">' + (job.desc || '') + '</span>' +
          '</div>' +
          '<div style="font-size:12px;font-weight:600;color:var(--muted);margin-top:3px">' + (job.addr || '') + ' · ' + (job.date || '') + '</div>' +
        '</div>' +
        '<div style="text-align:right;flex-shrink:0;margin-left:12px">' +
          '<div class="job-card-amount">' + TerryBot.formatCurrency(job.amount || 0) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="job-card-bottom">' +
        '<span class="job-inv-num">Invoice #' + job.id + '</span>' +
        '<div class="job-actions">' + actions + '</div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

async function init() {
  var session = await requireAuth();
  if (!session) return;
  clearDemoData();

  allJobs = await dbLoadJobs(session.user.id);
  TerryBot.setJobs(allJobs);

  var paid    = allJobs.filter(function(j) { return j.status === 'paid'; }).length;
  var pending = allJobs.filter(function(j) { return j.status === 'pending'; }).length;
  var overdue = allJobs.filter(function(j) { return j.status === 'overdue'; }).length;

  document.getElementById('paidCount').textContent    = paid;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('overdueCount').textContent = overdue;

  var tip = '';
  if (overdue > 0) {
    tip = 'You have <strong>' + overdue + ' overdue invoice' + (overdue > 1 ? 's' : '') + '</strong>. Chase them today - a quick text is usually all it takes!';
  } else if (pending > 0) {
    tip = 'You have <strong>' + pending + ' pending invoice' + (pending > 1 ? 's' : '') + '</strong>. Make sure they have been sent!';
  } else if (allJobs.length === 0) {
    tip = 'No jobs yet! Tap <strong>+</strong> below to create your first invoice.';
  } else {
    tip = 'All your invoices are paid - nice work! Tap <strong>+</strong> to create a new one.';
  }
  document.getElementById('terryTipText').innerHTML = tip;

  renderJobs();
}

async function signOut() {
  await _sb.auth.signOut();
  window.location.replace('login.html');
}

init();
</script>
<!-- REMINDER MODAL -->
<div id="reminderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:flex-end;justify-content:center">
  <div style="background:white;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:1.5rem;animation:slideUp 0.3s ease">
    <div style="width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:0 auto 1.25rem"></div>
    <div style="font-size:18px;font-weight:900;color:var(--navy);margin-bottom:4px">Send a reminder</div>
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:1.25rem" id="reminderInvoiceRef">Invoice #TB-001</div>

    <div style="background:#F9FAFB;border-radius:14px;padding:1rem;margin-bottom:1.25rem;border:1px solid var(--border)">
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Message preview</div>
      <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.7" id="reminderText"></div>
    </div>

    <button onclick="sendWhatsAppReminder()" class="btn btn-navy btn-full" style="margin-bottom:10px">
      💬 Send via WhatsApp
    </button>
    <button onclick="sendEmailReminder()" class="btn btn-outline btn-full" style="margin-bottom:10px">
      ✉️ Send via Email
    </button>
    <button onclick="closeReminderModal()" style="width:100%;padding:10px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">
      Cancel
    </button>
  </div>
</div>

<style>
.btn-yellow { background: var(--yellow); color: var(--navy); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>

<script>
var _reminderJob = null;
var _userProfile = null;

async function loadProfile() {
  var sess = await _sb.auth.getSession();
  if (!sess.data || !sess.data.session) return;
  var res = await _sb.from('profiles').select('name,business_name,phone,email').eq('id', sess.data.session.user.id).single();
  if (res.data) _userProfile = res.data;
}
loadProfile();

function getReminderText(job) {
  var firstName = (job.name || 'there').split(' ')[0];
  var bizName = (_userProfile && _userProfile.business_name) || 'us';
  var amount = '£' + parseFloat(job.amount || 0).toFixed(2);
  var invoiceId = job.id || '';
  var due = job.due || '';
  return 'Hi ' + firstName + ', just a friendly reminder that invoice ' + invoiceId + ' for ' + amount + ' is due for payment' + (due ? ' on ' + due : '') + '. If you have any questions please don't hesitate to get in touch. Many thanks, ' + bizName + '.';
}

function showReminderModal(job) {
  _reminderJob = job;
  var firstName = (job.name || 'there').split(' ')[0];
  document.getElementById('reminderInvoiceRef').textContent = 'Invoice #' + job.id + ' · ' + (job.name || '') + ' · £' + parseFloat(job.amount || 0).toFixed(2);
  document.getElementById('reminderText').textContent = getReminderText(job);
  var modal = document.getElementById('reminderModal');
  modal.style.display = 'flex';
  modal.addEventListener('click', function(e) { if (e.target === modal) closeReminderModal(); });
}

function closeReminderModal() {
  document.getElementById('reminderModal').style.display = 'none';
  _reminderJob = null;
}

function sendWhatsAppReminder() {
  if (!_reminderJob) return;
  var phone = (_reminderJob.phone || '').replace(/\s+/g, '').replace(/^0/, '44');
  var text = getReminderText(_reminderJob);
  var url = phone
    ? 'https://wa.me/' + phone + '?text=' + encodeURIComponent(text)
    : 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
  closeReminderModal();
}

function sendEmailReminder() {
  if (!_reminderJob) return;
  var email = _reminderJob.email || '';
  var subject = 'Invoice ' + _reminderJob.id + ' — Payment Reminder';
  var body = getReminderText(_reminderJob);
  window.open('mailto:' + email + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body), '_blank');
  closeReminderModal();
}
</script>

</body>
</html>
