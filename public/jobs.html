<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerryBot — All Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<meta name="theme-color" content="#1B2B4B"/>
</head>
<body>

<nav>
  <div class="nav-left" onclick="window.location.href='index.html'">
    <div class="nav-logo">T</div>
    <div>
      <div class="nav-brand">Terry<span>Bot</span></div>
      <div class="nav-tagline">Trade invoices &amp; tax made easy</div>
    </div>
  </div>
  <div class="nav-back" onclick="window.location.href='index.html'">← Dashboard</div>
</nav>

<div class="main">

  <!-- SUMMARY PILLS -->
  <div style="margin-top:1rem" class="summary-pills" id="summaryPills"></div>

  <!-- TERRY TIP -->
  <div class="terry-tip">
    <div class="terry-tip-img">
      <img src="images/terry-invoice-v2.png" alt="Terry"/>
    </div>
    <div class="terry-tip-bubble">
      <div class="terry-tip-title">Terry says...</div>
      <p class="terry-tip-text" id="terryTipText">Loading...</p>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by customer or job..." oninput="renderJobs()"/>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All jobs</button>
    <button class="filter-tab" onclick="setFilter('paid',this)">Paid</button>
    <button class="filter-tab" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-tab" onclick="setFilter('overdue',this)">Overdue</button>
  </div>

  <!-- JOB LIST -->
  <div id="jobList"></div>

  <!-- EMPTY STATE -->
  <div class="hidden" id="emptyState" style="text-align:center;padding:3rem 1rem">
    <div style="font-size:48px;margin-bottom:1rem">📋</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:6px">No jobs found</div>
    <div style="font-size:14px;font-weight:600;color:var(--muted)">Try a different search or filter</div>
  </div>

</div>

<!-- FAB -->
<div class="fab" onclick="window.location.href='invoice.html'" title="New invoice">＋</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item"><div class="nav-icon">🏠</div><div class="nav-item-label">Home</div></div>
  <div class="nav-item"><div class="nav-icon">📋</div><div class="nav-item-label">Invoices</div></div>
  <div class="nav-item"><div class="nav-icon">💰</div><div class="nav-item-label">Expenses</div></div>
  <div class="nav-item"><div class="nav-icon">📊</div><div class="nav-item-label">Tax</div></div>
  <div class="nav-item"><div class="nav-icon">⚙️</div><div class="nav-item-label">Settings</div></div>
</div>

<script src="js/app.js"></script>
<script>
TerryBot.initNav('jobs');
const stats = TerryBot.getStats();
let allJobs = TerryBot.getJobs();
let activeFilter = 'all';

// Summary pills
document.getElementById('summaryPills').innerHTML =
  '<div class="pill"><div class="pill-value green">' + stats.paidCount + '</div><div class="pill-label">Paid</div></div>' +
  '<div class="pill"><div class="pill-value orange">' + stats.pendingCount + '</div><div class="pill-label">Pending</div></div>' +
  '<div class="pill"><div class="pill-value red">' + stats.overdueCount + '</div><div class="pill-label">Overdue</div></div>';

// Terry tip
let tip = '';
if (stats.overdueCount > 0) {
  tip = 'You have <strong>' + stats.overdueCount + ' overdue invoice' + (stats.overdueCount > 1 ? 's' : '') + '</strong>. Chase them today — a quick text is usually all it takes!';
} else if (stats.pendingCount > 0) {
  tip = 'You have <strong>' + stats.pendingCount + ' pending invoice' + (stats.pendingCount > 1 ? 's' : '') + '</strong> totalling <strong>' + TerryBot.formatCurrency(stats.unpaidTotal) + '</strong>. Make sure they\'ve been sent!';
} else {
  tip = 'All your invoices are paid — nice work! Tap <strong>+</strong> below to create a new one.';
}
document.getElementById('terryTipText').innerHTML = tip;

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function renderJobs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let jobs = allJobs;
  if (activeFilter !== 'all') jobs = jobs.filter(j => j.status === activeFilter);
  if (q) jobs = jobs.filter(j =>
    j.name.toLowerCase().includes(q) ||
    j.desc.toLowerCase().includes(q) ||
    j.id.toLowerCase().includes(q)
  );

  const list  = document.getElementById('jobList');
  const empty = document.getElementById('emptyState');

  if (!jobs.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  list.innerHTML = jobs.map(job => {
    let actions = '';
    if (job.status === 'overdue') {
      actions = '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();TerryBot.showToast(\'Chase sent! 📧\')">Chase 🔔</button><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();window.location.href=\'invoice-view.html?id=' + job.id + '\'">View</button>';
    } else if (job.status === 'pending') {
      actions = '<button class="btn btn-sm btn-navy" onclick="event.stopPropagation();TerryBot.showToast(\'Invoice sent! 📧\')">Send 📧</button><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();window.location.href=\'invoice-view.html?id=' + job.id + '\'">View</button>';
    } else {
      actions = '<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();window.location.href=\'invoice-view.html?id=' + job.id + '\'">View PDF</button>';
    }
    return '<div class="job-card" onclick="window.location.href=\'invoice-view.html?id=' + job.id + '\'">' +
      '<div class="job-card-top">' +
        '<div>' +
          '<div class="job-card-name">' + job.name + '</div>' +
          '<div class="job-card-meta">' +
            '<span class="badge badge-' + job.status + '">' + job.status + '</span>' +
            '<span style="font-size:12px;font-weight:600;color:var(--muted)">' + job.desc + '</span>' +
          '</div>' +
          '<div style="font-size:12px;font-weight:600;color:var(--muted);margin-top:3px">📍 ' + job.addr + ' · ' + job.date + '</div>' +
        '</div>' +
        '<div style="text-align:right;flex-shrink:0;margin-left:12px">' +
          '<div class="job-card-amount">' + TerryBot.formatCurrency(job.amount) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="job-card-bottom">' +
        '<span class="job-inv-num">Invoice #' + job.id + '</span>' +
        '<div class="job-actions">' + actions + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

renderJobs();
</script>
</body>
</html>
